<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}JobTrack{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <a href="{{ url_for('index') }}" class="logo">
      <span class="logo-mark">▣</span>
      <span class="logo-text">JobTrack</span>
    </a>
    <a href="{{ url_for('add_job') }}" class="btn btn-primary">+ New Application</a>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
